name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: SemVer release tag, for example v1.0.0
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ inputs.version }}
  cancel-in-progress: false

env:
  UV_VERSION: 0.11.18

jobs:
  prepare:
    name: Prepare release source
    runs-on: ubuntu-latest
    outputs:
      source_sha: ${{ steps.capture-source.outputs.source_sha }}

    steps:
      - name: Validate release version
        run: |
          set -euo pipefail
          version="${{ inputs.version }}"
          api_url="${{ github.api_url }}/repos/${{ github.repository }}"

          if [[ ! "$version" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Release version must use Go module SemVer tag notation, for example v1.0.0 or v1.0.0-rc.1."
            exit 1
          fi
          if [ "${{ github.ref_name }}" != "${{ github.event.repository.default_branch }}" ]; then
            echo "Run releases from the default branch: ${{ github.event.repository.default_branch }}."
            exit 1
          fi

          release_status="$(curl -sS -o /dev/null -w '%{http_code}' \
            -H 'Accept: application/vnd.github+json' \
            -H 'Authorization: Bearer ${{ github.token }}' \
            "$api_url/releases/tags/$version")"
          case "$release_status" in
            200)
              echo "A GitHub release for $version already exists. Refusing to overwrite an existing release."
              exit 1
              ;;
            404)
              ;;
            *)
              echo "Could not verify whether release $version already exists. GitHub API returned HTTP $release_status."
              exit 1
              ;;
          esac

          tag_status="$(curl -sS -o /dev/null -w '%{http_code}' \
            -H 'Accept: application/vnd.github+json' \
            -H 'Authorization: Bearer ${{ github.token }}' \
            "$api_url/git/ref/tags/$version")"
          case "$tag_status" in
            200)
              echo "Git tag $version already exists."
              echo "The workflow will reuse the existing tag because no GitHub release was found."
              ;;
            404)
              ;;
            *)
              echo "Could not verify whether tag $version already exists. GitHub API returned HTTP $tag_status."
              exit 1
              ;;
          esac

      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.ref_name }}

      - name: Capture release source
        id: capture-source
        run: |
          set -euo pipefail

          echo "source_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  quality:
    name: Lint and Test
    needs: prepare
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.source_sha }}

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: ${{ env.UV_VERSION }}

      - name: Run Markdown lint
        run: ./scripts/lint-markdown.sh

      - name: Run YAML lint
        run: ./scripts/lint-yaml.sh

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Check module tidiness
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Check formatting
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "$unformatted"
            exit 1
          fi

      - name: Run vet
        run: go vet ./...

      - name: Run tests
        run: go test -race -coverprofile=coverage.out ./...

  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    needs:
      - prepare
      - quality
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.source_sha }}

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Build artifact
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          build_date="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          commit_sha="$(git rev-parse HEAD)"
          artifact="setup_${VERSION}_${GOOS}_${GOARCH}"
          mkdir -p "build/$artifact" dist
          binary="build/$artifact/setup"
          published_binary="dist/${artifact}"
          if [ "$GOOS" = "windows" ]; then
            binary="$binary.exe"
            published_binary="$published_binary.exe"
          fi

          ldflags="-s -w"
          ldflags="$ldflags -X github.com/strukturpiloten/container-setup.Version=$VERSION"
          ldflags="$ldflags -X github.com/strukturpiloten/container-setup.Commit=$commit_sha"
          ldflags="$ldflags -X github.com/strukturpiloten/container-setup.BuildDate=$build_date"

          CGO_ENABLED=0 go build \
            -trimpath \
            -ldflags "$ldflags" \
            -o "$binary" \
            ./cmd/setup

          cp "$binary" "$published_binary"
          tar -czf "dist/$artifact.tar.gz" -C build "$artifact"

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: setup-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.source_sha }}

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: Prepare versioned setup helper and release tag
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          sed -i "s/^CONTAINER_SETUP_VERSION=\"[^\"]*\"$/CONTAINER_SETUP_VERSION=\"$VERSION\"/" setup.sh
          if ! grep -qx "CONTAINER_SETUP_VERSION=\"$VERSION\"" setup.sh; then
            echo "Could not write CONTAINER_SETUP_VERSION=$VERSION to setup.sh."
            exit 1
          fi

          cp setup.sh dist/setup.sh
          chmod +x dist/setup.sh

          if git ls-remote --exit-code --tags origin "refs/tags/$VERSION" >/dev/null 2>&1; then
            echo "Git tag $VERSION already exists. Reusing the existing release tag."
            exit 0
          fi

          git config user.name "Github Action"
          git config user.email "action@github.com"

          if ! git diff --quiet -- setup.sh; then
            git add setup.sh
            git commit -m "chore(release): prepare $VERSION bundle"
          fi

          git tag "$VERSION"
          git push origin "refs/tags/$VERSION"

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum * > setup_${{ inputs.version }}_checksums.txt

      - name: Publish release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ inputs.version }}
          name: setup ${{ inputs.version }}
          generate_release_notes: true
          prerelease: ${{ contains(inputs.version, '-') }}
          files: |
            dist/*
          fail_on_unmatched_files: true
